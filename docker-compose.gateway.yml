services:
  # ═══════════════════════════════════════════════════════════
  # Traefik API Gateway / Reverse Proxy
  # Routes: [service].localhost → container
  # Dashboard: http://traefik.localhost
  # ═══════════════════════════════════════════════════════════
  traefik:
    image: traefik:v3.1
    container_name: agentmesh-traefik
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.entryPoint=metrics"
      - "--entrypoints.metrics.address=:8082"
    ports:
      - "80:80"
      - "443:443"
      - "8082:8082"    # Prometheus metrics
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./gateway/dynamic:/etc/traefik/dynamic:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.dashboard.service=api@internal"
    networks:
      - agentmesh-net
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════
  # AgentMesh Backend (Spring Boot) — Port 8081
  # Route: api.localhost
  # ═══════════════════════════════════════════════════════════
  agentmesh-api:
    build:
      context: ./AgentMesh
      dockerfile: Dockerfile
    container_name: agentmesh-api
    environment:
      # Local stage uses the shared dev infra (Protocol §1, §8): dev-postgres / dev-redis / LMStudio :1234
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - DB_HOST=${DB_HOST:-dev-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-agentmesh}
      - DB_USER=${DB_USER:-admin}
      - DB_PASSWORD=${DB_PASSWORD:-startup_password}
      - SPRING_DATA_REDIS_HOST=${SPRING_DATA_REDIS_HOST:-dev-redis}
      - SPRING_DATA_REDIS_PORT=${SPRING_DATA_REDIS_PORT:-6379}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai-compatible}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:1234/v1}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-magnum-12b-v2}
      # M13.3 commit 1 (R6 close): production-grade auth ON by default.
      # Override with `AUTH_ENFORCED=false` in `.env` for local debugging only.
      - AUTH_ENFORCED=${AUTH_ENFORCED:-true}
    labels:
      - "traefik.enable=true"
      # ─── Public-bypass router (priority 100) ──────────────────────────
      # Login/refresh/logout, health probes, and the WS handshake must be
      # reachable WITHOUT a Bearer token. Higher priority than the protected
      # router below shadows it on these path prefixes.
      # Note: Spring's SecurityConfig also permits these paths (defence in
      # depth); the WS handshake additionally validates `?token=` query
      # param via HandshakeInterceptor (M13.2).
      - "traefik.http.routers.agentmesh-api-public.rule=(Host(`api.localhost`) || Host(`api.agentmesh.localhost`)) && (PathPrefix(`/api/auth`) || PathPrefix(`/actuator/health`) || PathPrefix(`/actuator/info`) || PathPrefix(`/ws`))"
      - "traefik.http.routers.agentmesh-api-public.entrypoints=web"
      - "traefik.http.routers.agentmesh-api-public.service=agentmesh-api"
      - "traefik.http.routers.agentmesh-api-public.priority=100"
      - "traefik.http.routers.agentmesh-api-public.middlewares=api-ratelimit,api-cors"
      # ─── Protected router (priority 10) ──────────────────────────────
      # Everything else under api.*.localhost goes through `jwt-auth@file`
      # forwardAuth → /api/auth/verify; on 401 Traefik returns 401 to client.
      - "traefik.http.routers.agentmesh-api.rule=Host(`api.localhost`) || Host(`api.agentmesh.localhost`)"
      - "traefik.http.routers.agentmesh-api.entrypoints=web"
      - "traefik.http.routers.agentmesh-api.priority=10"
      - "traefik.http.services.agentmesh-api.loadbalancer.server.port=8081"
      # Rate limiting
      - "traefik.http.middlewares.api-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.api-ratelimit.ratelimit.burst=50"
      - "traefik.http.routers.agentmesh-api.middlewares=api-ratelimit,api-cors,jwt-auth@file"
      # CORS headers
      - "traefik.http.middlewares.api-cors.headers.accessControlAllowOriginList=http://localhost:3000,http://app.localhost,http://app.agentmesh.localhost"
      - "traefik.http.middlewares.api-cors.headers.accessControlAllowMethods=GET,POST,PUT,DELETE,OPTIONS"
      - "traefik.http.middlewares.api-cors.headers.accessControlAllowHeaders=Content-Type,Authorization,X-Tenant-Id"
    networks:
      - agentmesh-net
      - global-infra
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════
  # AgentMesh UI (Next.js) — Port 3000
  # Route: app.localhost
  # ═══════════════════════════════════════════════════════════
  agentmesh-ui:
    build:
      context: ./AgentMesh-UI/agentmesh-ui
      dockerfile: Dockerfile
    container_name: agentmesh-ui
    environment:
      - NEXT_PUBLIC_AGENTMESH_API=http://api.agentmesh.localhost
      - NEXT_PUBLIC_AUTOBADS_API=http://bads.localhost
      - NEXT_PUBLIC_WS_URL=ws://api.agentmesh.localhost/ws
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agentmesh-ui.rule=Host(`app.localhost`) || Host(`app.agentmesh.localhost`)"
      - "traefik.http.routers.agentmesh-ui.entrypoints=web"
      - "traefik.http.services.agentmesh-ui.loadbalancer.server.port=3000"
    networks:
      - agentmesh-net
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════
  # Auto-BADS (Spring Boot) — Port 8083
  # Route: bads.localhost
  # ═══════════════════════════════════════════════════════════
  auto-bads:
    build:
      context: ./Auto-BADS
      dockerfile: Dockerfile
    container_name: agentmesh-autobads
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - AGENTMESH_API_URL=http://agentmesh-api:8081
    labels:
      - "traefik.enable=true"
      # Legacy host (kept for backwards-compat)
      - "traefik.http.routers.auto-bads.rule=Host(`bads.localhost`)"
      - "traefik.http.routers.auto-bads.entrypoints=web"
      - "traefik.http.services.auto-bads.loadbalancer.server.port=8083"
      # M13.2: branded path-based route on the unified API host
      # Host(api.agentmesh.localhost) && PathPrefix(/bads) → strip → auto-bads:8083
      - "traefik.http.routers.auto-bads-path.rule=Host(`api.agentmesh.localhost`) && PathPrefix(`/bads`)"
      - "traefik.http.routers.auto-bads-path.entrypoints=web"
      - "traefik.http.routers.auto-bads-path.service=auto-bads"
      - "traefik.http.routers.auto-bads-path.priority=20"
      - "traefik.http.middlewares.bads-stripprefix.stripprefix.prefixes=/bads"
      - "traefik.http.routers.auto-bads-path.middlewares=bads-ratelimit,bads-stripprefix"
      # Rate limiting
      - "traefik.http.middlewares.bads-ratelimit.ratelimit.average=50"
      - "traefik.http.middlewares.bads-ratelimit.ratelimit.burst=20"
      - "traefik.http.routers.auto-bads.middlewares=bads-ratelimit"
    networks:
      - agentmesh-net
    restart: unless-stopped

networks:
  agentmesh-net:
    driver: bridge
  global-infra:
    external: true

