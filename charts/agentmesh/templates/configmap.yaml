apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agentmesh.fullname" . }}-config
  labels:
    {{- include "agentmesh.labels" . | nindent 4 }}
data:
  SPRING_PROFILES_ACTIVE: {{ include "agentmesh.springProfile" . | quote }}
  {{- range $key, $value := .Values.config }}
  {{- if and (ne $key "SPRING_PROFILES_ACTIVE") (ne (toString $value) "") }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}

