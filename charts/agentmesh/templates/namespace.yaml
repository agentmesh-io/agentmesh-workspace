{{- if .Values.namespace.create -}}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Release.Namespace }}
  labels:
    {{- include "agentmesh.labels" . | nindent 4 }}
    {{- with .Values.namespace.podSecurityLevel }}
    pod-security.kubernetes.io/enforce: {{ . | quote }}
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: {{ . | quote }}
    pod-security.kubernetes.io/warn: {{ . | quote }}
    {{- end }}
    {{- with .Values.namespace.extraLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.namespace.extraAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}

