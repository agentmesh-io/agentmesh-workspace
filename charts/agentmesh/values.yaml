# =============================================================================
# AgentMesh Helm chart â€” DEFAULT values (staging-ish profile).
#
# Stage-specific overrides live in values-dev.yaml / values-staging.yaml /
# values-prod.yaml. Architect Protocol Â§9 requires `dev/stage/prod` lanes
# with the host-routing convention `[svc].localhost`,
# `[svc]-stage.localhost`, `[svc]-prod.localhost`.
# =============================================================================

# Stage label â€” drives ConfigMap SPRING_PROFILES_ACTIVE + ingress hostnames.
# One of: dev | stage | prod
stage: stage

image:
  repository: ghcr.io/agentmesh-io/agentmesh
  tag: ""            # empty â†’ falls back to Chart.appVersion
  pullPolicy: IfNotPresent
  pullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

replicaCount: 2

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8081"
  prometheus.io/path: "/actuator/prometheus"

podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop: ["ALL"]

service:
  type: ClusterIP
  port: 8081
  targetPort: 8081
  sessionAffinity: ClientIP   # WS/streaming continuity
  annotations: {}

ingress:
  enabled: true
  className: traefik
  annotations: {}
  # `host` is left empty so each stage values file sets it (and avoids drift).
  host: ""
  path: /
  pathType: Prefix
  tls:
    enabled: false
    secretName: ""

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# Probe paths follow Spring Boot Actuator + the `agentmesh-api-public`
# Traefik bypass (R6 close â€” see docs/ACCEPTANCE_M13.3.md Â§"Commit 1").
probes:
  startup:
    enabled: true
    path: /actuator/health
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 30        # 5 min hard ceiling on cold-start
  liveness:
    enabled: true
    path: /actuator/health/liveness
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: true
    path: /actuator/health/readiness
    initialDelaySeconds: 30
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  # Behavior tuned with M12 load-test numbers (docs/LOAD_TEST_REPORT_M12.md):
  #   â€˘ baseline p95 = 12.96 ms @ 100 VUs sustained, 222 req/s, 0 errors
  #     â†’ 38Ă— headroom vs. 500 ms gate; CPU is the lagging signal, not RPS
  #   â€˘ ramp-up p95 peaked at 109 ms during 15 s burst â†’ scale-up reacts
  #     fast (15 s stabilization) so cold pods finish startup before next wave
  #   â€˘ scale-down deliberately slow (5 min stabilization, 50 %/min cap)
  #     to keep capacity sticky across LLM bursts (longer-tail than HTTP)
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max

podDisruptionBudget:
  enabled: false
  minAvailable: 1

nodeSelector: {}
tolerations: []

# Spread pods across nodes â€” soft preference (lets dev/stage on 1-node clusters).
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - agentmesh
          topologyKey: kubernetes.io/hostname

# initContainers wait for shared infra (postgres/redis/kafka) to come up
# before Spring tries to connect. Stage values trim/extend the list.
initContainers:
  - name: wait-for-postgres
    image: busybox:1.37
    command:
      - sh
      - -c
      - 'until nc -z $POSTGRES_HOST $POSTGRES_PORT; do echo "waiting for postgres"; sleep 2; done;'
    env:
      - name: POSTGRES_HOST
        value: postgres
      - name: POSTGRES_PORT
        value: "5432"
  - name: wait-for-redis
    image: busybox:1.37
    command:
      - sh
      - -c
      - 'until nc -z $REDIS_HOST $REDIS_PORT; do echo "waiting for redis"; sleep 2; done;'
    env:
      - name: REDIS_HOST
        value: redis
      - name: REDIS_PORT
        value: "6379"

# Non-secret application config rendered into a ConfigMap.
config:
  SPRING_PROFILES_ACTIVE: ""    # Computed from .stage when blank
  SERVER_PORT: "8081"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/agentmesh"
  SPRING_DATASOURCE_DRIVER_CLASS_NAME: "org.postgresql.Driver"
  SPRING_JPA_DATABASE_PLATFORM: "org.hibernate.dialect.PostgreSQLDialect"
  SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
  SPRING_DATA_REDIS_HOST: "redis"
  SPRING_DATA_REDIS_PORT: "6379"
  SPRING_CACHE_TYPE: "redis"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  AGENTMESH_MULTITENANCY_ENABLED: "true"
  AGENTMESH_MULTITENANCY_DEFAULT_TIER: "STANDARD"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus,metrics"
  MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"
  # R6 (M13.3 c1): Spring fails closed by default.
  AUTH_ENFORCED: "true"

# Extra raw env entries appended verbatim (e.g. JAVA_OPTS).
extraEnv: []

# Secrets live in a chart-managed Secret by default; consumers should
# replace with sealed-secrets / external-secrets in real prod.
secret:
  create: true
  name: ""
  annotations: {}
  data:
    SPRING_DATASOURCE_USERNAME: "agentmesh"
    SPRING_DATASOURCE_PASSWORD: "CHANGE_ME"
    GITHUB_TOKEN: ""
    OPENAI_API_KEY: ""

# Reference an externally-managed Secret instead of `secret.create=true`.
existingSecret: ""

# NetworkPolicy hooks. Hardened in commits 4+. Ingress and data-tier
# selectors are configurable so each cluster operator can pin them to
# their actual namespaces (Traefik typically lives in `traefik`/`kube-system`,
# data services in `data`/`platform`).
networkPolicy:
  enabled: false
  # Namespaces (by `kubernetes.io/metadata.name`) allowed to send ingress
  # to AgentMesh pods. Empty list = no namespace selector â†’ only same-ns.
  ingressFromNamespaces:
    - traefik
    - ingress-nginx
  # Allowed egress targets. Each entry produces one matching `to` block.
  egressToNamespaces:
    - default      # default for in-cluster shared infra
  # Extra raw egress rules appended after the templated ones (escape hatch).
  extraEgress: []

# Optional Namespace template â€” the chart can manage its own namespace
# with PSA labels (Pod Security Admission). Stage profiles set the level.
# Disabled by default so consumers don't accidentally claim ownership of
# a shared namespace they didn't create.
namespace:
  create: false
  podSecurityLevel: ""   # "" | "privileged" | "baseline" | "restricted"
  extraLabels: {}
  extraAnnotations: {}

# Prometheus Operator integration. ServiceMonitor scrapes the `http`
# port at `/actuator/prometheus`. Off by default (most clusters don't
# run prom-operator); staging/prod values flip it on.
metrics:
  serviceMonitor:
    enabled: false
    namespace: ""        # defaults to release namespace when blank
    labels: {}
    interval: 30s
    scrapeTimeout: 10s

# Topology spread â€” used in prod to enforce 1-pod-per-zone HA without
# relying solely on soft pod anti-affinity (which is best-effort).
topologySpreadConstraints: []

extraVolumes: []
extraVolumeMounts: []

