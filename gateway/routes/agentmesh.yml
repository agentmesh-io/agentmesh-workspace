http:
  # ═══════════════════════════════════════════════════════════════
  # AgentMesh v1.0 — Shared Traefik registration
  # Target: AgentMesh API running on host :8081 (Java/Spring Boot)
  # Routes:
  #   api.agentmesh.localhost  → /api, /actuator (backend)
  # Middlewares: rate-limit (100 r/s avg, 50 burst) + CORS
  # Per Architect Protocol v7.24 §4 & §8
  # ═══════════════════════════════════════════════════════════════
  routers:
    agentmesh-api:
      rule: "Host(`api.agentmesh.localhost`)"
      entryPoints:
        - web
      service: agentmesh-api
      middlewares:
        - agentmesh-ratelimit
        - agentmesh-cors

  services:
    agentmesh-api:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8081"
        passHostHeader: true

  middlewares:
    agentmesh-ratelimit:
      rateLimit:
        average: 100
        burst: 50
    agentmesh-cors:
      headers:
        accessControlAllowOriginList:
          - "http://localhost:3000"
          - "http://app.agentmesh.localhost"
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        accessControlAllowHeaders:
          - Content-Type
          - Authorization
          - X-Tenant-Id
        accessControlMaxAge: 600
        addVaryHeader: true

