# Traefik Dynamic Configuration
# Rate limiting, headers, and middleware

http:
  middlewares:
    # Global security headers
    security-headers:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true
        frameDeny: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
        customResponseHeaders:
          X-Powered-By: "AgentMesh"

    # JWT Auth middleware (for protected routes) — M13.2
    # Calls /api/auth/verify on agentmesh-api with the upstream Authorization
    # header; on 200 the X-User-Id / X-Tenant-Id / X-Roles headers are
    # forwarded to the destination. On 401 Traefik returns 401 to the client.
    jwt-auth:
      forwardAuth:
        address: "http://agentmesh-api:8081/api/auth/verify"
        trustForwardHeader: true
        authResponseHeaders:
          - "X-User-Id"
          - "X-Tenant-Id"
          - "X-Roles"
        authRequestHeaders:
          - "Authorization"

    # Retry on failure
    retry-middleware:
      retry:
        attempts: 3
        initialInterval: 100ms

    # Circuit breaker
    circuit-breaker:
      circuitBreaker:
        expression: "ResponseCodeRatio(500, 600, 0, 600) > 0.30"

    # Compress responses
    compress:
      compress:
        excludedContentTypes:
          - "text/event-stream"

